<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AgentTalk 功能概览</title>
  <desc id="desc">AgentTalk connects CLI, Web UI, Feishu, Hub, local relay, and tmux-hosted AI agents with reliable delivery, context, heartbeat, and response tracking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#edf7f5"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="56" y="54" width="1168" height="612" rx="24" fill="#ffffff" opacity="0.76"/>

  <text x="96" y="112" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0f172a">AgentTalk</text>
  <text x="96" y="150" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">LAN agent message bus for tmux-hosted Codex / Claude / OpenCode workers</text>

  <g filter="url(#shadow)">
    <rect x="462" y="210" width="356" height="180" rx="18" fill="url(#hub)"/>
    <text x="640" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">Hub</text>
    <text x="640" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#dbeafe">registry · routing · status · response</text>
    <rect x="498" y="324" width="284" height="38" rx="10" fill="#ffffff" opacity="0.16"/>
    <text x="640" y="349" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">/agents /send /status /context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="220" width="250" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="126" y="258" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750" fill="#0f172a">CLI</text>
    <text x="206" y="258" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">send · watch</text>

    <rect x="96" y="306" width="250" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="126" y="344" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750" fill="#0f172a">Web UI</text>
    <text x="220" y="344" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">PTY · monitor</text>

    <rect x="96" y="392" width="250" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="126" y="430" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750" fill="#0f172a">Feishu Bot</text>
    <text x="246" y="430" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">chat commands</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="934" y="206" width="250" height="72" rx="16" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="1059" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#115e59">Local Relay</text>
    <text x="1059" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f766e">heartbeat · inject · watch</text>

    <rect x="934" y="310" width="250" height="56" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1059" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="750" fill="#9a3412">tmux panes</text>

    <rect x="934" y="392" width="116" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="992" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="750" fill="#1d4ed8">Codex</text>
    <rect x="1068" y="392" width="116" height="54" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="1126" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="750" fill="#6d28d9">Claude</text>
  </g>

  <path d="M 346 251 C 392 251 410 250 452 250" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 346 337 C 394 337 410 318 452 304" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 346 423 C 410 423 416 366 452 352" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 818 300 C 862 300 884 248 924 244" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 934 244 C 888 244 864 292 828 300" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <path d="M 1059 278 L 1059 302" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1016 366 L 1000 384" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1102 366 L 1120 384" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <text x="96" y="528" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">可靠投递链路</text>
    <rect x="96" y="552" width="184" height="46" rx="10" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="188" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#155e75">inbox fallback</text>
    <rect x="302" y="552" width="164" height="46" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="384" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#1d4ed8">auto_submit</text>
    <rect x="488" y="552" width="142" height="46" rx="10" fill="#f0fdf4" stroke="#86efac"/>
    <text x="559" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#166534">ACK marker</text>
    <rect x="652" y="552" width="172" height="46" rx="10" fill="#fff7ed" stroke="#fdba74"/>
    <text x="738" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#9a3412">response watch</text>
    <rect x="846" y="552" width="166" height="46" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="929" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#334155">context</text>
    <rect x="1034" y="552" width="150" height="46" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="1109" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="750" fill="#991b1b">offline/stale</text>
  </g>

  <g>
    <path d="M 281 575 L 294 575" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 467 575 L 480 575" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 631 575 L 644 575" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 825 575 L 838 575" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 1013 575 L 1026 575" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <text x="96" y="638" font-family="Inter, Arial, sans-serif" font-size="17" fill="#475569">Long tasks are stored as local inbox files; relay injects compact prompts, verifies submission, watches ACK/response, and keeps agent status fresh.</text>
</svg>
